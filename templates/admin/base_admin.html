<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Educatec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: #1e293b;
            min-height: 100vh;
            position: fixed;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #334155;
            z-index: 100;
        }

        .sidebar-brand {
            padding: 28px 24px;
            border-bottom: 1px solid #334155;
        }

        .sidebar-brand h4 {
            color: #38bdf8;
            font-weight: 800;
            font-size: 20px;
            margin: 0;
        }

        .sidebar-brand span {
            color: #64748b;
            font-size: 12px;
        }

        .sidebar-nav {
            padding: 20px 0;
            flex: 1;
        }

        .nav-section {
            padding: 8px 24px 4px;
            font-size: 10px;
            font-weight: 700;
            color: #475569;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .nav-link-admin {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 24px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all .2s;
            border-left: 3px solid transparent;
        }

        .nav-link-admin:hover,
        .nav-link-admin.active {
            background: rgba(56,189,248,.08);
            color: #38bdf8;
            border-left-color: #38bdf8;
        }

        .nav-link-admin i {
            width: 18px;
            text-align: center;
            font-size: 15px;
        }

        .sidebar-footer {
            padding: 20px 24px;
            border-top: 1px solid #334155;
        }

        .sidebar-footer a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ef4444;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: .2s;
        }

        .sidebar-footer a:hover { color: #fca5a5; }

        /* MAIN */
        .main-content {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .topbar {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h5 {
            margin: 0;
            font-weight: 700;
            color: #f1f5f9;
            font-size: 18px;
        }

        .topbar-user {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #94a3b8;
            font-size: 14px;
        }

        .avatar-admin {
            width: 36px; height: 36px;
            background: #38bdf8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0f172a;
            font-weight: 700;
            font-size: 14px;
        }

        .page-body {
            padding: 32px;
            flex: 1;
        }

        /* CARDS STATS */
        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
            transition: .3s;
        }

        .stat-card:hover {
            border-color: #38bdf8;
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(56,189,248,.1);
        }

        .stat-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #f1f5f9;
            line-height: 1;
        }

        .stat-label {
            color: #64748b;
            font-size: 13px;
            margin-top: 4px;
        }

        /* TABLES */
        .admin-table {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            overflow: hidden;
        }

        .admin-table-header {
            padding: 20px 24px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-table-header h6 {
            margin: 0;
            font-weight: 700;
            color: #f1f5f9;
            font-size: 16px;
        }

        .table-dark-custom {
            color: #cbd5e1;
            margin: 0;
        }

        .table-dark-custom thead th {
            background: #0f172a;
            color: #64748b;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px 24px;
            border: none;
        }

        .table-dark-custom tbody td {
            padding: 14px 24px;
            border-color: #334155;
            vertical-align: middle;
            font-size: 14px;
        }

        .table-dark-custom tbody tr:hover {
            background: rgba(56,189,248,.05);
        }

        /* BADGES */
        .badge-rol {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
        }

        .badge-docente  { background: rgba(56,189,248,.15); color: #38bdf8; }
        .badge-alumno   { background: rgba(34,197,94,.15);  color: #22c55e; }
        .badge-admin    { background: rgba(168,85,247,.15); color: #a855f7; }
        .badge-usuario  { background: rgba(100,116,139,.15);color: #64748b; }

        .badge-pendiente { background: rgba(251,191,36,.15); color: #fbbf24; }
        .badge-entregada { background: rgba(34,197,94,.15);  color: #22c55e; }
        .badge-vencida   { background: rgba(239,68,68,.15);  color: #ef4444; }

        .btn-action {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: .2s;
        }

        .btn-danger-soft {
            background: rgba(239,68,68,.15);
            color: #ef4444;
        }

        .btn-danger-soft:hover { background: #ef4444; color: white; }

        .btn-success-soft {
            background: rgba(34,197,94,.15);
            color: #22c55e;
        }

        .btn-success-soft:hover { background: #22c55e; color: white; }

        @media(max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <h4><i class="fas fa-graduation-cap me-2"></i>Educatec</h4>
        <span>Panel Administrador</span>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section">Principal</div>
        <a href="{#}" class="nav-link-admin {% if request.resolver_match.url_name == 'panel_admin' %}active{% endif %}">
            <i class="fas fa-chart-pie"></i> Dashboard
        </a>

        <div class="nav-section mt-3">Gestión</div>
        <a href="{#}" class="nav-link-admin {% if request.resolver_match.url_name == 'admin_usuarios' %}active{% endif %}">
            <i class="fas fa-users"></i> Usuarios
        </a>
        <a href="{#}" class="nav-link-admin {% if request.resolver_match.url_name == 'admin_estudiantes' %}active{% endif %}">
            <i class="fas fa-user-graduate"></i> Estudiantes
        </a>
        <a href="{#}" class="nav-link-admin {% if request.resolver_match.url_name == 'admin_docentes' %}active{% endif %}">
            <i class="fas fa-chalkboard-teacher"></i> Docentes
        </a>
        <a href="{#}" class="nav-link-admin {% if request.resolver_match.url_name == 'admin_tareas' %}active{% endif %}">
            <i class="fas fa-tasks"></i> Tareas
        </a>

        <div class="nav-section mt-3">Sistema</div>
        <a href="/admin/" class="nav-link-admin">
            <i class="fas fa-cog"></i> Django Admin
        </a>
    </nav>

    <div class="sidebar-footer">
        <a href="{#}">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </a>
    </div>
</aside>

<!-- MAIN -->
<div class="main-content">
    <div class="topbar">
        <h5>{% block page_title %}Dashboard{% endblock %}</h5>
        <div class="topbar-user">
            <div class="avatar-admin">
                {{ request.user.username|first|upper }}
            </div>
            <span>{{ request.user.username }}</span>
        </div>
    </div>

    <div class="page-body">
        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
