{% extends 'admin/base_admin.html' %}
{% load static %}

{% block title %}Crear Curso{% endblock %}

{% block content %}

<h1 style="color: #333;">Crear Curso</h1>
<div class="card">
    <div class="card-body">
        <form action="{% url 'crear_curso' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Guardar</button>
        </form>
    </div>
</div>

{% endblock %}
