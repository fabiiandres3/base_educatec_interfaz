{% extends 'admin/base_admin.html' %}
{% load static %}


{% block title %}Editar Curso{% endblock %}

{% block content %}
<h1 style="color: #333;">Editar Curso</h1>
<div class="container">
    <h1 class="mt-4">Editar Curso</h1>
    <form method="post" class="mt-3">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{% url 'listar_cursos' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>


{% endblock %}
