{% extends 'admin/base_admin.html' %}
{% load static %}

<title>{% block page_title %}Crear Clase{% endblock %}</title>

{% block content %}

<div class="container">
    <h1 class="mt-4">Crear Clase</h1>
    <form method="post" class="mt-3">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{% url 'clases' %}" class="btn btn-secondary">Cancelar</a>
    </form>

{% endblock %}
